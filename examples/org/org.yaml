apiVersion: vcd.upbound.io/v1alpha1
kind: Org
metadata:
  name: crossplanes
spec:
  forProvider:
    accountLockout:
    - enabled: true
      invalidLoginsBeforeLockout: 10
      lockoutIntervalMinutes: 60
    deleteForce: true
    deleteRecursive: true
    description: Test building an org form crossplane
    fullName: Crossplane organization
    isEnabled: true
    name: crossplanes
    vappLease:
    - deleteOnStorageLeaseExpiration: false
      maximumRuntimeLeaseInSec: 3600
      maximumStorageLeaseInSec: 0
      powerOffOnRuntimeLeaseExpiration: true
    vappTemplateLease:
    - deleteOnStorageLeaseExpiration: true
      maximumStorageLeaseInSec: 604800
  providerConfigRef:
      name: default